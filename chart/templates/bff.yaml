apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  labels: { app: bff }
spec:
  replicas: 1
  selector:
    matchLabels: { app: bff }
  template:
    metadata:
      labels: { app: bff }
    spec:
      containers:
        - name: bff
          image: "{{ .Values.bff.image }}:{{ .Values.bff.tag }}"
          ports:
            - containerPort: 8080
          env:
            - name: POLICY_API_URL
              value: "{{ .Values.bff.policyApiUrl }}"
            - name: OTEL_SERVICE_NAME
              value: bff
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.otel.endpoint }}"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace={{ .Values.otel.namespace }},deployment.environment=prod"
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: bff
spec:
  selector: { app: bff }
  ports:
    - port: 8080
      targetPort: 8080
