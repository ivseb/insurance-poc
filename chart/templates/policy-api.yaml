apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-api
  labels: { app: policy-api }
spec:
  replicas: 1
  selector:
    matchLabels: { app: policy-api }
  template:
    metadata:
      labels: { app: policy-api }
    spec:
      containers:
        - name: policy-api
          image: "{{ .Values.policyApi.image }}:{{ .Values.policyApi.tag }}"
          ports:
            - containerPort: 9000
          env:
            - name: OTEL_SERVICE_NAME
              value: policy-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.otel.endpoint }}"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace={{ .Values.otel.namespace }},deployment.environment=prod"
          readinessProbe:
            httpGet: { path: /health, port: 9000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: policy-api
spec:
  selector: { app: policy-api }
  ports:
    - port: 9000
      targetPort: 9000
