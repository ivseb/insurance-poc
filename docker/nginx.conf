# Gateway del frontend: serve l'export statico Kobweb (layout flat: index.html, <route>.html,
# area/<route>.html, base.css, insurance.js alla root) e fa da reverse proxy per il BFF.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API → BFF (stessa origin: niente CORS, cookie HttpOnly funzionante)
    location /api/ {
        proxy_pass http://bff:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pagine prerenderizzate + asset; fallback su index.html (idrata il JS) per rotte client-side.
    # Es: /prodotti → prodotti.html ; /area/policies → area/policies.html ; /insurance.js e /base.css a root.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
