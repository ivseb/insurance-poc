# Gateway del frontend: serve l'export statico Kobweb e fa da reverse proxy per il BFF.
# Struttura dell'export (.kobweb/site): pages/ (HTML prerenderizzati), system/insurance.js,
# resources/base.css — tutti referenziati come URL di root, quindi li rimappo qui.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;   # = .kobweb/site (pages/ resources/ system/)

    # API → BFF (stessa origin: niente CORS, cookie HttpOnly funzionante)
    location /api/ {
        proxy_pass http://bff:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Home
    location = / {
        try_files /pages/index.html =404;
    }

    # Pagine prerenderizzate + asset (system/, resources/) + fallback SPA.
    # Es: /prodotti → pages/prodotti.html ; /insurance.js → system/insurance.js ;
    #     /base.css → resources/base.css ; rotta sconosciuta → pages/index.html (idrata il JS).
    location / {
        try_files /pages$uri.html /pages$uri/index.html /resources$uri /system$uri /pages/index.html;
    }
}
