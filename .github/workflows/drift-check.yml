name: Drift check

# Rete di sicurezza: verifica che ciò che è su main sia davvero ciò che è deployato.
# Per ogni modulo confronta l'ULTIMO commit che lo tocca (main) con il tag in env/prod (chart/values.yaml).
# Se un modulo è cambiato ma il suo tag non è stato bumpato (build fallita/saltata) → FALLISCE
# (run rosso + email GitHub). È esattamente il caso "modifica committata ma non deployata".
on:
  schedule:
    - cron: '*/30 * * * *'   # ogni 30 minuti
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # serve tutta la storia per `git log`
      - name: Install yq
        run: |
          sudo curl -sSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
      - name: Confronta codice (main) vs tag deployati (env/prod)
        run: |
          set -uo pipefail
          git fetch -q --tags origin env/prod 2>/dev/null || { echo "::error::branch env/prod assente: nulla è ancora deployato"; exit 1; }
          git show origin/env/prod:chart/values.yaml > /tmp/deployed.yaml
          drift=0
          check() {
            name=$1; module=$2; shift 2
            last=$(git log -1 --format=%H -- "$@")
            ver=$(yq ".$module.tag" /tmp/deployed.yaml)                 # es. 1.3.0
            depcommit=$(git rev-list -n1 "v$ver" 2>/dev/null || true)   # commit della release deployata
            if [ -z "$depcommit" ]; then
              echo "::error::DRIFT [$name]: tag v$ver non trovato (versione deployata senza release)"; drift=1
            elif git merge-base --is-ancestor "$last" "$depcommit"; then
              echo "OK [$name]: ultima modifica inclusa in v$ver"
            else
              echo "::error::DRIFT [$name]: modifica su main NON ancora rilasciata (deployato v$ver)"; drift=1
            fi
          }
          COMMON="shared gradle gradlew settings.gradle.kts build.gradle.kts gradle.properties"
          # jvm: bff e policy-api condividono lo stesso tag → basta controllarne uno
          check jvm bff bff policy-api $COMMON docker/Dockerfile.service
          check web web web designsystem $COMMON docker/Dockerfile.web docker/nginx.conf
          exit $drift
