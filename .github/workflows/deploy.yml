name: CI/CD

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'

permissions:
  contents: write   # per committare il bump dei tag (GitOps)
  packages: write   # per pushare le immagini su ghcr

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

env:
  PREFIX: ghcr.io/${{ github.repository_owner }}/insurance-poc

jobs:
  # PR gate: compila tutto (deve essere VERDE per poter fare merge su main). Niente push/deploy.
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile (jvm + web)
        run: ./gradlew :policy-api:build :bff:build :shared:build :designsystem:compileKotlinJs :web:compileKotlinJs --build-cache

  # Capisce COSA è cambiato → ricostruiamo solo il necessario
  changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      jvm: ${{ steps.f.outputs.jvm }}
      web: ${{ steps.f.outputs.web }}
      tag: ${{ steps.t.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: t
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            common: &common
              - 'shared/**'
              - 'gradle/**'
              - 'gradlew'
              - 'settings.gradle.kts'
              - 'build.gradle.kts'
              - 'gradle.properties'
            jvm:
              - *common
              - 'bff/**'
              - 'policy-api/**'
              - 'docker/Dockerfile.service'
            web:
              - *common
              - 'web/**'
              - 'designsystem/**'
              - 'docker/Dockerfile.web'
              - 'docker/nginx.conf'

  # Backend JVM (in parallelo col web)
  jvm:
    needs: changes
    if: needs.changes.outputs.jvm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - name: Build fat jars
        run: ./gradlew :policy-api:buildFatJar :bff:buildFatJar --build-cache
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.service
          build-args: |
            JAR=policy-api/build/libs/policy-api-all.jar
            SHA=${{ needs.changes.outputs.tag }}
          tags: ${{ env.PREFIX }}-policy-api:${{ needs.changes.outputs.tag }},${{ env.PREFIX }}-policy-api:latest
          push: true
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.service
          build-args: |
            JAR=bff/build/libs/bff-all.jar
            SHA=${{ needs.changes.outputs.tag }}
          tags: ${{ env.PREFIX }}-bff:${{ needs.changes.outputs.tag }},${{ env.PREFIX }}-bff:latest
          push: true

  # Frontend web (in parallelo col jvm)
  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - name: Cache Kobweb CLI
        uses: actions/cache@v4
        with:
          path: kobweb-0.9.18
          key: kobweb-cli-0.9.18
      - name: Install Kobweb CLI
        run: |
          if [ ! -x kobweb-0.9.18/bin/kobweb ]; then
            curl -sSL https://github.com/varabyte/kobweb-cli/releases/download/v0.9.18/kobweb-0.9.18.zip -o kobweb.zip
            unzip -q kobweb.zip
          fi
          echo "$GITHUB_WORKSPACE/kobweb-0.9.18/bin" >> "$GITHUB_PATH"
      - name: Export web (static site)
        run: (cd web && kobweb export --layout static --notty)
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          build-args: |
            SHA=${{ needs.changes.outputs.tag }}
          tags: ${{ env.PREFIX }}-web:${{ needs.changes.outputs.tag }},${{ env.PREFIX }}-web:latest
          push: true

  # Bump dei tag SOLO per le immagini ricostruite + commit GitOps
  deploy:
    needs: [ changes, jvm, web ]
    if: ${{ always() && !cancelled() && needs.jvm.result != 'failure' && needs.web.result != 'failure' && (needs.jvm.result == 'success' || needs.web.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        run: curl -sSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
      - name: Bump image tags
        run: |
          TAG=${{ needs.changes.outputs.tag }}
          cd deploy
          if [ "${{ needs.jvm.result }}" = "success" ]; then
            ../kustomize edit set image \
              $PREFIX-policy-api=$PREFIX-policy-api:$TAG \
              $PREFIX-bff=$PREFIX-bff:$TAG
          fi
          if [ "${{ needs.web.result }}" = "success" ]; then
            ../kustomize edit set image $PREFIX-web=$PREFIX-web:$TAG
          fi
      - name: Pubblica sul branch di deploy (env/prod)
        # main resta protetto (solo PR): i tag li scrive la CI su env/prod, che ArgoCD segue.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/kustomization.yaml
          git commit -m "ci: deploy ${{ needs.changes.outputs.tag }}" || { echo "nothing to commit"; exit 0; }
          git branch -f env/prod
          git push -f origin env/prod
