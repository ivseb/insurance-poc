name: CI/CD

on:
  push:
    branches: [ main ]

permissions:
  contents: write   # per committare il bump dei tag (GitOps)
  packages: write   # per pushare le immagini su ghcr

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-deploy:
    # Evita il loop: il commit di bump tag è marcato [skip ci]
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    env:
      PREFIX: ghcr.io/${{ github.repository_owner }}/insurance-poc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build fat jars (policy-api, bff)
        run: ./gradlew :policy-api:buildFatJar :bff:buildFatJar --no-daemon

      - name: Install Kobweb CLI
        run: |
          curl -sSL https://github.com/varabyte/kobweb-cli/releases/download/v0.9.18/kobweb-0.9.18.zip -o kobweb.zip
          unzip -q kobweb.zip
          echo "$GITHUB_WORKSPACE/kobweb-0.9.18/bin" >> "$GITHUB_PATH"

      - name: Export web (static site)
        run: (cd web && kobweb export --layout static --notty)

      - name: Compute image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push images
        run: |
          set -euo pipefail
          for svc in policy-api bff; do
            docker build -f docker/Dockerfile.service \
              --build-arg JAR=$svc/build/libs/$svc-all.jar \
              -t "$PREFIX-$svc:$TAG" -t "$PREFIX-$svc:latest" .
            docker push "$PREFIX-$svc:$TAG"
            docker push "$PREFIX-$svc:latest"
          done
          docker build -f docker/Dockerfile.web -t "$PREFIX-web:$TAG" -t "$PREFIX-web:latest" .
          docker push "$PREFIX-web:$TAG"
          docker push "$PREFIX-web:latest"

      - name: Bump image tags (GitOps commit)
        run: |
          sed -i "s/newTag: .*/newTag: $TAG/" deploy/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/kustomization.yaml
          git commit -m "ci: deploy $TAG [skip ci]" || { echo "nothing to commit"; exit 0; }
          git push
