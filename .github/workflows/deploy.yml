name: CI/CD

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'

permissions:
  contents: write   # per committare il bump dei tag (GitOps)
  packages: write   # per pushare le immagini su ghcr

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

env:
  PREFIX: ghcr.io/${{ github.repository_owner }}/insurance-poc

jobs:
  # PR gate: compila tutto (deve essere VERDE per poter fare merge su main). Niente push/deploy.
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile (jvm + web)
        run: ./gradlew :policy-api:build :bff:build :shared:build :designsystem:compileKotlinJs :web:compileKotlinJs --build-cache

  # Capisce COSA è cambiato → ricostruiamo solo il necessario
  changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      jvm: ${{ steps.f.outputs.jvm }}
      web: ${{ steps.f.outputs.web }}
      tag: ${{ steps.semver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # serve la storia + i tag per calcolare la versione
      # Semantic versioning da conventional-commits: feat→minor, BREAKING/!→major, altro→patch.
      - uses: paulhatch/semantic-version@v5.4.0
        id: semver
        with:
          tag_prefix: "v"
          major_pattern: "/(BREAKING CHANGE|!:)/"
          minor_pattern: "/^feat/"
          version_format: "${major}.${minor}.${patch}"
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            common: &common
              - 'shared/**'
              - 'gradle/**'
              - 'gradlew'
              - 'settings.gradle.kts'
              - 'build.gradle.kts'
              - 'gradle.properties'
            jvm:
              - *common
              - 'bff/**'
              - 'policy-api/**'
              - 'docker/Dockerfile.service'
            web:
              - *common
              - 'web/**'
              - 'designsystem/**'
              - 'docker/Dockerfile.web'
              - 'docker/nginx.conf'

  # Backend JVM (in parallelo col web)
  jvm:
    needs: changes
    if: needs.changes.outputs.jvm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - name: Build fat jars
        run: ./gradlew :policy-api:buildFatJar :bff:buildFatJar --build-cache
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.service
          build-args: |
            JAR=policy-api/build/libs/policy-api-all.jar
            SHA=${{ needs.changes.outputs.tag }}
          tags: ${{ env.PREFIX }}-policy-api:${{ needs.changes.outputs.tag }},${{ env.PREFIX }}-policy-api:latest
          push: true
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.service
          build-args: |
            JAR=bff/build/libs/bff-all.jar
            SHA=${{ needs.changes.outputs.tag }}
          tags: ${{ env.PREFIX }}-bff:${{ needs.changes.outputs.tag }},${{ env.PREFIX }}-bff:latest
          push: true

  # Frontend web (in parallelo col jvm)
  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - name: Cache Kobweb CLI
        uses: actions/cache@v4
        with:
          path: kobweb-0.9.18
          key: kobweb-cli-0.9.18
      - name: Install Kobweb CLI
        run: |
          if [ ! -x kobweb-0.9.18/bin/kobweb ]; then
            curl -sSL https://github.com/varabyte/kobweb-cli/releases/download/v0.9.18/kobweb-0.9.18.zip -o kobweb.zip
            unzip -q kobweb.zip
          fi
          echo "$GITHUB_WORKSPACE/kobweb-0.9.18/bin" >> "$GITHUB_PATH"
      - name: Export web (static site)
        run: (cd web && kobweb export --layout static --notty)
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          build-args: |
            SHA=${{ needs.changes.outputs.tag }}
          tags: ${{ env.PREFIX }}-web:${{ needs.changes.outputs.tag }},${{ env.PREFIX }}-web:latest
          push: true

  # Bump dei tag SOLO per le immagini ricostruite + commit GitOps
  deploy:
    needs: [ changes, jvm, web ]
    if: ${{ always() && !cancelled() && needs.jvm.result != 'failure' && needs.web.result != 'failure' && (needs.jvm.result == 'success' || needs.web.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo curl -sSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
      - name: Aggiorna i tag su chart/values.yaml (accumulo) e pubblica su env/prod
        # main resta protetto (solo PR): i tag li scrive la CI su env/prod (chart Helm), che ArgoCD segue.
        # Accumulo: prima si preservano i tag già deployati (env/prod), poi si bumpano SOLO i moduli
        # ricostruiti in questo run → niente regressioni sugli altri moduli.
        # Messaggio PARLANTE: riporta il commit reale su main (subject + link).
        env:
          SRC_MSG: ${{ github.event.head_commit.message }}
        run: |
          TAG=${{ needs.changes.outputs.tag }}
          if git fetch -q origin env/prod 2>/dev/null && git show origin/env/prod:chart/values.yaml > /tmp/prev.yaml 2>/dev/null; then
            for m in policyApi bff web; do
              t=$(yq ".$m.tag" /tmp/prev.yaml)
              [ "$t" != "null" ] && yq -i ".$m.tag = \"$t\"" chart/values.yaml
            done
          fi
          if [ "${{ needs.jvm.result }}" = "success" ]; then
            yq -i ".policyApi.tag = \"$TAG\"" chart/values.yaml
            yq -i ".bff.tag = \"$TAG\"" chart/values.yaml
          fi
          if [ "${{ needs.web.result }}" = "success" ]; then
            yq -i ".web.tag = \"$TAG\"" chart/values.yaml
          fi
          SUBJECT=$(printf '%s' "$SRC_MSG" | head -1)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chart/values.yaml
          git commit \
            -m "deploy $TAG — ${SUBJECT}" \
            -m "source: ${{ github.repository }}@${{ github.sha }}" \
            -m "https://github.com/${{ github.repository }}/commit/${{ github.sha }}" \
            || { echo "nothing to commit"; exit 0; }
          git branch -f env/prod
          git push -f origin env/prod
      - name: Tag di release (vX.Y.Z sul commit di main)
        run: |
          git tag "v${{ needs.changes.outputs.tag }}" ${{ github.sha }} || true
          git push origin "v${{ needs.changes.outputs.tag }}" || echo "tag già esistente"
