apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: insurance-poc

resources:
- namespace.yaml
- policy-api.yaml
- bff.yaml
- web.yaml
- ingress.yaml

# La CI aggiorna i tag qui (`kustomize edit set image ...`) a ogni push → ArgoCD sincronizza.
images:
- name: ghcr.io/ivseb/insurance-poc-bff
  newName: ghcr.io/ivseb/insurance-poc-bff
  newTag: 21bb58c
- name: ghcr.io/ivseb/insurance-poc-policy-api
  newName: ghcr.io/ivseb/insurance-poc-policy-api
  newTag: 21bb58c
- name: ghcr.io/ivseb/insurance-poc-web
  newName: ghcr.io/ivseb/insurance-poc-web
  newTag: 21bb58c
