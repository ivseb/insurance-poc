apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: insurance-poc
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ivseb/insurance-poc
    targetRevision: main
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: insurance-poc
  syncPolicy:
    automated:
      prune: true      # rimuove risorse tolte dal repo
      selfHeal: true   # ripristina lo stato desiderato se qualcuno tocca il cluster a mano
    syncOptions:
      - CreateNamespace=true
