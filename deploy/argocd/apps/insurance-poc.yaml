apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: insurance-poc
  namespace: argocd
  annotations:
    # sottoscrizioni notifiche (dichiarative, non più via kubectl annotate)
    notifications.argoproj.io/subscribe.on-health-degraded.echo: ""
    notifications.argoproj.io/subscribe.on-deployed.echo: ""
spec:
  project: default
  source:
    repoURL: https://github.com/ivseb/insurance-poc
    # main è protetto (solo PR); i tag di deploy vivono su env/prod, scritto dalla CI.
    targetRevision: env/prod
    # chart Helm: ArgoCD lo renderizza con chart/values.yaml (dove la CI scrive i tag).
    path: chart
  destination:
    server: https://kubernetes.default.svc
    namespace: insurance-poc
  # Argo Rollouts inietta `rollouts-pod-template-hash` nel selector dei Service active/preview:
  # è il controller a gestirlo, quindi ArgoCD deve IGNORARLO (altrimenti selfHeal lo annulla di continuo).
  ignoreDifferences:
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/selector/rollouts-pod-template-hash
  syncPolicy:
    automated:
      prune: true      # rimuove risorse tolte dal repo
      selfHeal: true   # ripristina lo stato desiderato se qualcuno tocca il cluster a mano
    syncOptions:
      - CreateNamespace=true
